name: Build unsigned IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cần Xcode mới (SDK iOS 26) để biên dịch hiệu ứng Liquid Glass (GlassKit.swift)
      - name: Select latest Xcode (26.x)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode & Swift version
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          set -eo pipefail
          xcodegen generate
          ls -la

      - name: Show available schemes
        run: xcodebuild -list -project KENIOS.xcodeproj

      - name: Build (no code signing)
        run: |
          set -eo pipefail
          xcodebuild \
            -project KENIOS.xcodeproj \
            -scheme KENIOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package into unsigned .ipa
        run: |
          set -eo pipefail
          APP_PATH=$(find build/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Không tìm thấy file .app sau khi build."
            find build/Build/Products -maxdepth 3
            exit 1
          fi
          echo "App: $APP_PATH"
          rm -rf Payload
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r KENIOS-unsigned.ipa Payload >/dev/null
          ls -lh KENIOS-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: KENIOS-unsigned-ipa
          path: KENIOS-unsigned.ipa
          if-no-files-found: error
